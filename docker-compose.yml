version: "3.8"

services:
  nginx:
    image: ${DOCKER_USER}/nginx:latest
    container_name: nginx-container
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    image: ${DOCKER_USER}/frontend:latest
    container_name: frontend-container
    ports:
      - "5173:5173"
    restart: always

  backend:
    image: ${DOCKER_USER}/backend:latest
    container_name: backend-container
    ports:
      - "3000:3000"
    restart: always
